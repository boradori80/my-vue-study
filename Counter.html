<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vue 3 Counter App</title>
  <!-- Vue 3 CDN 가져오기 (Vue 라이브러리 로드) -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    body {
      font-family: 'Outfit', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .counter-card {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      text-align: center;
      width: 320px;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 20px;
      color: #94a3b8;
    }
    .display {
      font-size: 4rem;
      font-weight: 800;
      margin: 20px 0;
      color: #38bdf8;
      text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
      transition: all 0.2s ease;
    }
    /* 숫자가 음수일 때 강조 효과를 줄 수 있는 스타일 */
    .negative {
      color: #f43f5e;
      text-shadow: 0 0 10px rgba(244, 63, 94, 0.3);
    }
    .button-group {
      display: flex;
      justify-content: center;
      gap: 15px;
    }
    button {
      background: #0284c7;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 1.5rem;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      flex: 1;
    }
    button:hover {
      background: #0369a1;
      transform: translateY(-2px);
    }
    button:active {
      transform: translateY(0);
    }
    /* 감소 버튼은 조금 다른 색상 */
    .btn-minus {
      background: #475569;
    }
    .btn-minus:hover {
      background: #334155;
    }
  </style>
</head>
<body>

  <!-- 1. Vue가 관리할 영역 (마운트 대상) -->
  <div id="app">
    <div class="counter-card">
      <h1>Vue 3 카운터</h1>
      
      <!-- 2. 화면에 값 출력하기 (Mustache 문법 & 클래스 바인딩) -->
      <!-- count가 0보다 작으면 'negative' 클래스를 동적으로 붙여 붉은색으로 표시합니다 -->
      <div class="display" :class="{ negative: count < 0 }">
        {{ count }}
      </div>

      <div class="button-group">
        <!-- 3. 클릭 이벤트 연결 (@click) -->
        <button class="btn-minus" @click="decrease">-</button>
        <button @click="increase">+</button>
      </div>
    </div>
  </div>

  <!-- 4. Vue 동작 스크립트 작성 -->
  <script>
    // Vue 라이브러리에서 필요한 기능(createApp, ref)을 꺼냅니다.
    const { createApp, ref } = Vue;

    createApp({
      setup() {
        // [반응형 데이터 정의]
        // ref()로 감싸면 값이 바뀔 때 화면이 알아서(반응하여) 다시 그려집니다.
        const count = ref(0);

        // [함수 정의]
        // 카운트를 증가시키는 함수
        const increase = () => {
          // ref로 만든 변수의 값을 읽거나 바꿀 때는 뒤에 '.value'를 붙여야 합니다.
          count.value = count.value + 1;
        };

        // 카운트를 감소시키는 함수
        const decrease = () => {
          count.value = count.value - 1;
        };

        // HTML 영역(Template)에서 사용할 수 있도록 변수와 함수를 반환(return)합니다.
        return {
          count,
          increase,
          decrease
        }
      }
    }).mount('#app'); // id가 app인 div에 이 Vue 인스턴스를 갖다 붙입니다(마운트).
  </script>
</body>
</html>
